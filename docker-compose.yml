services:
  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: delivery_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: delivery_api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MONGO_URI: "mongodb://mongodb:27017"
    depends_on:
      - redis
      - mongodb

  frontend:
    build: ./frontend
    container_name: delivery_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  redis_data:
  mongo_data:
