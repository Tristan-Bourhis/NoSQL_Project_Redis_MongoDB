services:
  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: delivery_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data:
